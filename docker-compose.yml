# Solomon — Docker Compose for local development

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: solomon
      POSTGRES_USER: solomon
      POSTGRES_PASSWORD: solomon_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solomon"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: development
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
      - "5678:5678"  # debugpy
    environment:
      - DJANGO_SETTINGS_MODULE=solomon.settings.dev
      - DATABASE_URL=postgres://solomon:solomon_dev@db:5432/solomon
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
